name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Run unit tests
        run: |
          python -m unittest tests/test_bo.py tests/test_mobo.py | tee python-test.log

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-log
          path: python-test.log

  unity-validation:
    if: ${{ secrets.UNITY_LICENSE != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [editmode, playmode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Unity tests (${{ matrix.testMode }})
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          testMode: ${{ matrix.testMode }}
          artifactsPath: unity-test-results-${{ matrix.testMode }}

      - name: Upload Unity test artifacts (${{ matrix.testMode }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ matrix.testMode }}
          path: unity-test-results-${{ matrix.testMode }}

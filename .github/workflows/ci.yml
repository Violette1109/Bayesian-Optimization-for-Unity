name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Run unit tests
        run: |
          python -m unittest tests/test_bo.py tests/test_mobo.py | tee python-test.log

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-log
          path: python-test.log

  unity-validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [editmode, playmode]
    steps:
      - name: Check Unity license availability
        id: unity_license
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Unity validation skipped (missing UNITY_LICENSE)
        if: steps.unity_license.outputs.available != 'true'
        run: echo "UNITY_LICENSE is not configured; skipping Unity validation job."

      - name: Checkout
        if: steps.unity_license.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Run Unity tests (${{ matrix.testMode }})
        if: steps.unity_license.outputs.available == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          testMode: ${{ matrix.testMode }}
          artifactsPath: unity-test-results-${{ matrix.testMode }}

      - name: Upload Unity test artifacts (${{ matrix.testMode }})
        if: always() && steps.unity_license.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ matrix.testMode }}
          path: unity-test-results-${{ matrix.testMode }}
